version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: werewolf
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      WEREWOLF_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/werewolf"
      WEREWOLF_HOST: "0.0.0.0"
      WEREWOLF_PORT: "8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: "http://localhost:8000"
      NEXT_PUBLIC_WS_BASE: "ws://localhost:8000"
    depends_on:
      - backend

volumes:
  pgdata:
